name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: edo_test
          POSTGRES_USER: edo
          POSTGRES_PASSWORD: edo_secret
        ports:
          - 5499:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379

    env:
      DATABASE_URL: postgresql+asyncpg://edo:edo_secret@localhost:5499/edo_test
      REDIS_URL: redis://localhost:6399/0
      PASETO_SECRET_KEY: ci-test-secret-key-32-chars-long-ok
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f docker/Dockerfile -t edo-adapter-enterprise:ci .
