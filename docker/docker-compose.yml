services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    command: uvicorn src.main:app --host 0.0.0.0 --port 8099 --reload
    env_file: ../.env
    ports:
      - "8099:8099"
    volumes:
      - ../src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: edo-adapter-api
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    command: >
      celery -A src.infrastructure.queue.celery_app worker
      -Q edo.send,edo.sync,edo.webhooks,edo.dlq,edo.health
      -c 4 --loglevel=info
    env_file: ../.env
    depends_on:
      - postgres
      - redis
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: edo-adapter-worker
    restart: unless-stopped

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    command: celery -A src.infrastructure.queue.celery_app beat --loglevel=info
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: edo_adapter
      POSTGRES_USER: edo
      POSTGRES_PASSWORD: edo
    ports:
      - "5499:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edo -d edo_adapter"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change-me}
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://:${REDIS_PASSWORD:-change-me}@redis:6379/0 flower
    ports:
      - "5599:5555"
    depends_on:
      - redis
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9099:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4399:4317"
      - "3299:3200"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3199:3100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3099:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  tempo_data:
  grafana_data:
